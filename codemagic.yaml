workflows:
  ios-free-build-optimized:
    name: iOS Unsigned (Clean Version)
    max_build_duration: 120
    instance_type: mac_mini_m1

    environment:
      flutter: stable
      groups:
        - magic_vars

    scripts:
      - name: Initialize
        script: |
          flutter pub get

      - name: Build & Package
        script: |
          set -e

          # Build the iOS app without signing
          flutter build ios --release --no-codesign

          # Find generated .app file
          APP_PATH=$(find build/ios/iphoneos -name "*.app" | head -n 1)

          # Create Payload folder
          mkdir -p Payload

          # Copy app into Payload
          cp -R "$APP_PATH" Payload/

          # Package into IPA
          cd Payload/..
          zip -r unsigned_app.ipa Payload

    artifacts:
      - unsigned_app.ipa
